# SwiftLint для нативного iOS-экосистемы AliStore.
#
# Пока это НЕ блокирующий гейт: на момент подключения репозиторий даёт
# 544 нарушения (68 error / 476 warning), из них 434 — line_length в
# Client/AliStoreClientApp.swift. Сначала разбираем долг, потом включаем
# в mvp:verify. Запуск: `npm run ios:lint`.

included:
  - Client
  - Staff
  - Courier
  - POS
  - Shared
  - Tests
  - UITests

excluded:
  - build
  - AliStoreNative.xcodeproj

# Правила, которые дают шум без пользы на этом коде.
disabled_rules:
  - todo

opt_in_rules:
  - empty_count
  - force_unwrapping
  - redundant_nil_coalescing

# Границы соответствуют CLAUDE.md: файлы ≤800 строк, функции небольшие.
file_length:
  warning: 800
  error: 1500

type_body_length:
  warning: 350
  error: 500

function_body_length:
  warning: 60
  error: 120

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: false

identifier_name:
  excluded:
    - id
    - to
    - qr

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #0B0A08; }
a { color: #FF7A4D; text-decoration: none; } a:hover { color: #FF9A6E; }
::selection { background: #FF5B2E; color: #fff; }
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(24px,-20px) scale(1.1);}}
</style>
</helmet>

<div style="position: relative; overflow: hidden; min-height: 100vh; background: radial-gradient(circle at 16% 4%, #2B221B 0%, #14100C 46%, #0B0A08 100%); font-family: 'Golos Text', sans-serif; color: #E5DCD3; padding: 30px 34px 56px;">
  <div style="position: absolute; inset: 0; z-index: 0; overflow: hidden;">
    <div style="position: absolute; top: -150px; left: -110px; width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(circle, rgba(255,91,46,0.5), transparent 68%); filter: blur(24px); animation: floatBlob 16s ease-in-out infinite;"></div>
    <div style="position: absolute; bottom: -180px; right: -90px; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle, rgba(127,176,236,0.32), transparent 68%); filter: blur(28px); animation: floatBlob 20s ease-in-out infinite reverse;"></div>
  </div>

  <a href="AliStore Обзор проекта.dc.html" style="position: fixed; top: 16px; right: 16px; z-index: 99; background: rgba(255,255,255,0.08); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.14); color: #fff; border-radius: 999px; padding: 9px 16px; font-size: 13px; font-weight: 600;">⌂ Обзор</a>

  <div style="position: relative; z-index: 1; max-width: 1080px; margin: 0 auto;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px;">
      <div style="width: 36px; height: 36px; border-radius: 11px; background: linear-gradient(135deg,#FF7A4D,#E8410F); display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Sora'; font-weight: 800; font-size: 19px; box-shadow: 0 6px 18px rgba(255,91,46,0.45), inset 0 1px 0 rgba(255,255,255,0.4);">A</div>
      <span style="font-family: 'Sora'; font-weight: 800; font-size: 24px; color: #fff;">Внедрение · ступень Crawl</span>
      <span style="margin-left: auto; font-size: 12.5px; color: #8A7F76;">0–1 месяц · фундамент маховика</span>
    </div>
    <div style="font-size: 13px; color: #8A7F76; margin-bottom: 18px;">Отмечайте задачи — прогресс и готовность к переходу на Walk считаются вживую.</div>

    <!-- progress -->
    <div style="padding: 18px 20px; border-radius: 18px; margin-bottom: 16px; background: linear-gradient(160deg, rgba(255,255,255,0.085), rgba(255,255,255,0.02)); -webkit-backdrop-filter: blur(22px) saturate(180%); backdrop-filter: blur(22px) saturate(180%); border: 1px solid rgba(255,255,255,0.11); box-shadow: 0 12px 34px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.16);">
      <div style="display: flex; align-items: baseline; margin-bottom: 10px;"><span style="font-family: 'Sora'; font-weight: 700; font-size: 15px; color: #fff;">Готовность ступени</span><span style="margin-left: auto; font-family: 'Sora'; font-weight: 800; font-size: 24px; color: {{ pctColor }};">{{ pct }}%</span></div>
      <div style="height: 12px; background: rgba(255,255,255,0.09); border-radius: 999px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);"><div style="width: {{ pct }}%; height: 100%; background: linear-gradient(90deg,#FF7A4D,#C6FF3D); box-shadow: 0 0 12px rgba(198,255,61,0.5); transition: width .3s;"></div></div>
      <div style="font-size: 12px; color: {{ gateColor }}; margin-top: 10px;">{{ gateText }}</div>
    </div>

    <!-- groups -->
    <sc-for list="{{ groups }}" as="g" hint-placeholder-count="4">
      <div style="margin-bottom: 14px; border-radius: 16px; overflow: hidden; background: linear-gradient(160deg, rgba(255,255,255,0.075), rgba(255,255,255,0.02)); -webkit-backdrop-filter: blur(22px) saturate(180%); backdrop-filter: blur(22px) saturate(180%); border: 1px solid rgba(255,255,255,0.11); box-shadow: 0 10px 28px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.15);">
        <div style="display: flex; align-items: center; gap: 10px; padding: 13px 18px; border-bottom: 1px solid rgba(255,255,255,0.08);"><span style="font-size: 17px;">{{ g.icon }}</span><span style="font-family: 'Sora'; font-weight: 700; font-size: 14px; color: #fff;">{{ g.name }}</span><span style="margin-left: auto; font-family: 'JetBrains Mono'; font-size: 12px; color: #8A7F76;">{{ g.done }}/{{ g.total }}</span></div>
        <sc-for list="{{ g.tasks }}" as="t" hint-placeholder-count="3">
          <div onClick="{{ t.toggle }}" style="display: flex; align-items: center; gap: 13px; padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;">
            <span style="width: 24px; height: 24px; flex-shrink: 0; border-radius: 8px; border: 2px solid {{ t.brd }}; background: {{ t.chkBg }}; color: #14110E; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;">{{ t.chk }}</span>
            <div style="flex: 1;"><div style="font-size: 13.5px; color: {{ t.textFg }}; text-decoration: {{ t.strike }};">{{ t.name }}</div><div style="font-size: 11px; color: #8A7F76;">{{ t.where }}</div></div>
            <span style="background: {{ t.tagBg }}; color: {{ t.tagFg }}; border-radius: 6px; padding: 2px 9px; font-size: 10.5px;">{{ t.tag }}</span>
          </div>
        </sc-for>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:840}}">
class Component extends DCLogic {
  state = { done: {} };
  toggle(k){ const d={...this.state.done}; d[k]=!d[k]; this.setState({done:d}); }
  renderVals(){
    const s=this.state;
    const def=[
      ["📇","Данные и профиль",[
        ["ph","Телефон обязателен на каждой продаже (POS + онлайн)","POS · checkout","done"],
        ["prof","Единый профиль клиента: устройства, история","ERP · CRM","done"],
        ["consent","Consent-центр: согласия на push/WhatsApp/SMS","Приложение · профиль","готово"]
      ]],
      ["🛰️","Живые данные",[
        ["stock","Остаток и цена из Event Ledger в реальном времени","Все окна","done"],
        ["status","Статус заказа только с сервера (не локально)","Приложение · сайт","done"],
        ["sync","Синхронизация наличия при покупке","Приложение","готово"]
      ]],
      ["🔗","Связь и навигация",[
        ["deep","Deep-link из push/QR/чека на нужный экран","Приложение","done"],
        ["states","Состояния: загрузка / ошибка / пусто / оффлайн","Приложение · сайт","готово"],
        ["nav","Хаб «Система» связывает все окна","ERP","done"]
      ]],
      ["🎨","Единый стиль",[
        ["glass","Liquid-glass на всех экранах","Вся система","done"],
        ["cyr","Кириллица корректна (Manrope/Golos)","Вся система","done"],
        ["brand","Оранжевый бренд + палитра ролей","Вся система","готово"]
      ]]
    ];
    let total=0, done=0;
    const groups=def.map(g=>{
      let gd=0;
      const tasks=g[2].map(t=>{
        const on=!!s.done[t[0]]; total++; if(on){done++;gd++;}
        return { name:t[1], where:t[2], tag:t[3], toggle:()=>this.toggle(t[0]),
          chk:on?"✓":"", chkBg:on?"#C6FF3D":"transparent", brd:on?"#C6FF3D":"#3A342E",
          textFg:on?"#8A7F76":"#fff", strike:on?"line-through":"none",
          tagBg:on?"rgba(198,255,61,0.12)":"rgba(255,255,255,0.06)", tagFg:on?"#C6FF3D":"#A79C92" };
      });
      return { icon:g[0], name:g[1], tasks, done:gd, total:g[2].length };
    });
    const pct=Math.round(done/total*100);
    const ready=pct===100;
    return { groups, pct,
      pctColor: pct===100?"#C6FF3D":pct>=50?"#FF9A6E":"#E5B23C",
      gateText: ready?"✓ Фундамент готов — можно переходить на ступень Walk (lifecycle-триггеры, единая корзина, trade-in).":"Отметьте все задачи, чтобы разблокировать переход на Walk.",
      gateColor: ready?"#C6FF3D":"#8A7F76" };
  }
}
</script>
</body>
</html>

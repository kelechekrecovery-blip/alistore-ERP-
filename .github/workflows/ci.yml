name: CI

on:
  pull_request:
  push:
    branches: [main, master, codex/open-source-integrations]

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Parse Render blueprints
        run: |
          ruby -e "require 'yaml'; %w[render.yaml infra/render.staging.yaml].each { |f| abort(f) unless YAML.safe_load(File.read(f), aliases: true)['services'].is_a?(Array) }"
      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t alistore-api:${{ github.sha }} .
      - name: Build web image
        run: docker build -f docker/web.Dockerfile -t alistore-web:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: alistore-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
      - uses: gitleaks/gitleaks-action@v2

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alistore
          POSTGRES_PASSWORD: alistore
          POSTGRES_DB: alistore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alistore -d alistore_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://alistore:alistore@localhost:5432/alistore_test?schema=public
      TEST_DATABASE_URL: postgresql://alistore:alistore@localhost:5432/alistore_test?schema=public
      E2E_DATABASE_URL: postgresql://alistore:alistore@localhost:5432/alistore_test?schema=public
      JWT_SECRET: ci-secret-alistore
      AUTH_OTP_DEV_ECHO: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate -w @alistore/api
      - run: npm exec -w @alistore/api -- prisma migrate deploy
      - run: npm run api:build
      - run: npm run build -w @alistore/web
      - run: npm run api:test
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
